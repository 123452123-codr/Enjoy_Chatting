<html>
    <head>

        <link rel="icon" href="Enjoy Chatting!.png">

    </head>
    <body>
        <style>
            @import url(https://fonts.googleapis.com/css?family=Work+Sans:300,600);

            body{
	            font-size: 20px;
	            font-family: 'Work Sans', sans-serif;
	            color: #333;
                font-weight: 300;
                text-align: center;
                background-color: #f8f6f0;
            }
            p{
                font-size: 20px;
            }
            h1{
                font-weight: 300;

                padding: 10px;

            }

        <h1>Enjoy Chatting!</h1>

        <br>
        <img src="Enjoy Chatting!.png" alt="Icon">
        <br>
        <p align="center">Enjoy Chatting!</p>
        <script>
            let signUpDone = localStorage.getItem("SignUpDone");
            let signInDone = localStorage.getItem("signInDone");
            if(signUpDone === "1" && signInDone === "1")
            {
                setTimeout(function(){
                    window.location.replace("mainpage.html","_self");
                }, 1000);
            }
            else if(signUpDone === "1" && signInDone != "1")
            {
                setTimeout(function(){
                    window.location.replace("signIn.html","_self");
                }, 1000);
            }
            else if(signUpDone != "1" && signInDone != "1")
            {
                setTimeout(function(){
                    window.location.replace("signUp.html","_self");
                }, 1000);
            }
        </script>
    </body>
</html>
